<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conciliador de Pagos</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 560px;
      width: 100%;
      padding: 32px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #718096;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #4a5568;
    }

    .file-input {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px dashed #cbd5e0;
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .file-input:hover,
    .file-input.dragover {
      border-color: #4472c4;
      background: #ebf4ff;
    }

    .file-input input { display: none; }

    .file-icon {
      font-size: 1.4rem;
    }

    .file-name {
      font-size: 0.85rem;
      color: #718096;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-name.selected { color: #2d3748; font-weight: 500; }

    .optional {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .optional input,
    .optional select,
    .date-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.85rem;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .optional input:focus,
    .optional select:focus,
    .date-field input:focus {
      outline: none;
      border-color: #4472c4;
      box-shadow: 0 0 0 3px rgba(68, 114, 196, 0.15);
    }

    .date-field {
      position: relative;
    }

    .date-field input {
      padding-left: 36px;
      cursor: pointer;
    }

    .date-field::before {
      content: "📅";
      position: absolute;
      left: 12px;
      top: 36px;
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0.7;
      z-index: 1;
    }

    /* Flatpickr — tema acorde al conciliador */
    .flatpickr-calendar {
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      border: 1px solid #e2e8f0;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .flatpickr-months .flatpickr-month {
      background: #4472c4;
      color: #fff;
      border-radius: 12px 12px 0 0;
    }

    .flatpickr-current-month .flatpickr-monthDropdown-months,
    .flatpickr-current-month input.cur-year {
      color: #fff;
      font-weight: 600;
    }

    .flatpickr-weekdays {
      background: #f7fafc;
    }

    span.flatpickr-weekday {
      color: #4a5568;
      font-weight: 600;
    }

    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
      background: #4472c4;
      border-color: #4472c4;
    }

    .flatpickr-day.selected:hover,
    .flatpickr-day:hover {
      background: #365ea8;
      border-color: #365ea8;
    }

    .flatpickr-day.today {
      border-color: #4472c4;
    }

    .flatpickr-months .flatpickr-prev-month,
    .flatpickr-months .flatpickr-next-month {
      fill: #fff;
    }

    .flatpickr-months .flatpickr-prev-month:hover svg,
    .flatpickr-months .flatpickr-next-month:hover svg {
      fill: #ebf4ff;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #4472c4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #365ea8; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .error {
      margin-top: 16px;
      padding: 12px;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.85rem;
      display: none;
    }

    .error.visible { display: block; }

    .loading {
      display: none;
      text-align: center;
      margin-top: 16px;
      color: #718096;
      font-size: 0.9rem;
    }

    .loading.visible { display: block; }

    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .step {
      flex: 1;
      text-align: center;
      font-size: 0.75rem;
      color: #a0aec0;
      padding-bottom: 6px;
      border-bottom: 2px solid #e2e8f0;
    }

    .step span { display: block; font-size: 1.1rem; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Conciliador de Pagos</h1>
    <p class="subtitle">Ventas + Cashea + BNC → reporte Excel</p>

    <div class="steps">
      <div class="step"><span>1</span>Ventas</div>
      <div class="step"><span>2</span>Cashea</div>
      <div class="step"><span>3</span>BNC</div>
    </div>

    <form id="form">
      <div class="field">
        <label>Archivo de Ventas (.xlsx)</label>
        <label class="file-input" id="drop-ventas">
          <span class="file-icon">📊</span>
          <span class="file-name" id="name-ventas">Seleccionar o arrastrar archivo</span>
          <input type="file" name="ventas" accept=".xls,.xlsx" required />
        </label>
      </div>

      <div class="field">
        <label>Archivo Merchant / Cashea (.xlsx)</label>
        <label class="file-input" id="drop-merchant">
          <span class="file-icon">💳</span>
          <span class="file-name" id="name-merchant">Seleccionar o arrastrar archivo</span>
          <input type="file" name="merchant" accept=".xls,.xlsx" required />
        </label>
      </div>

      <div class="field">
        <label>Extracto Banco BNC (.xls / .xlsx)</label>
        <label class="file-input" id="drop-banco">
          <span class="file-icon">🏦</span>
          <span class="file-name" id="name-banco">Seleccionar o arrastrar archivo</span>
          <input type="file" name="banco" accept=".xls,.xlsx,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" required />
        </label>
      </div>

      <div class="optional">
        <div style="grid-column: 1 / -1">
          <label>Empresa</label>
          <select name="empresa" required>
            <option value="" disabled selected>Selecciona una empresa</option>
            <option value="EMBUTIDOS FATTORIA">EMBUTIDOS FATTORIA</option>
            <option value="MOHAN 2025">MOHAN 2025</option>
            <option value="EMBUTIDOS MOHAN">EMBUTIDOS MOHAN</option>
            <option value="DELICATESES EMMANUEL">DELICATESES EMMANUEL</option>
            <option value="DELICATESES MOMOY">DELICATESES MOMOY</option>
            <option value="DISTRIBUIDORA Y COMERCIALIZADORA MOREFINA">DISTRIBUIDORA Y COMERCIALIZADORA MOREFINA</option>
          </select>
        </div>
        <div class="date-field">
          <label>Rango desde (opcional)</label>
          <input type="text" id="fechaDesde" name="fechaDesde" placeholder="Selecciona fecha" autocomplete="off" />
        </div>
        <div class="date-field">
          <label>Rango hasta (opcional)</label>
          <input type="text" id="fechaHasta" name="fechaHasta" placeholder="Selecciona fecha" autocomplete="off" />
        </div>
      </div>

      <button type="submit" id="btn">Generar conciliación</button>
    </form>

    <div class="error" id="error"></div>
    <div class="loading" id="loading">Procesando archivos…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
  <script>
    const fpDesde = flatpickr("#fechaDesde", {
      locale: "es",
      dateFormat: "Y-m-d",
      altInput: true,
      altFormat: "d/m/Y",
      disableMobile: true,
      allowInput: false,
      onChange(_dates, dateStr) {
        fpHasta.set("minDate", dateStr || null);
      },
    });

    const fpHasta = flatpickr("#fechaHasta", {
      locale: "es",
      dateFormat: "Y-m-d",
      altInput: true,
      altFormat: "d/m/Y",
      disableMobile: true,
      allowInput: false,
      onChange(_dates, dateStr) {
        fpDesde.set("maxDate", dateStr || null);
      },
    });

    function setupDropzone(dropId, inputName, nameId) {
      const drop = document.getElementById(dropId);
      const input = drop.querySelector('input');
      const nameEl = document.getElementById(nameId);

      input.addEventListener('change', () => {
        if (input.files[0]) {
          nameEl.textContent = input.files[0].name;
          nameEl.classList.add('selected');
        }
      });

      ['dragenter', 'dragover'].forEach((ev) => {
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach((ev) => {
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.remove('dragover');
        });
      });

      drop.addEventListener('drop', (e) => {
        const file = e.dataTransfer.files[0];
        if (file && /\.xlsx?$/i.test(file.name)) {
          const dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          nameEl.textContent = file.name;
          nameEl.classList.add('selected');
        }
      });
    }

    setupDropzone('drop-ventas', 'ventas', 'name-ventas');
    setupDropzone('drop-merchant', 'merchant', 'name-merchant');
    setupDropzone('drop-banco', 'banco', 'name-banco');

    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const errorEl = document.getElementById('error');
    const loadingEl = document.getElementById('loading');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      loadingEl.classList.add('visible');
      btn.disabled = true;

      const formData = new FormData(form);

      try {
        const res = await fetch('/api/conciliar', { method: 'POST', body: formData });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'Error al procesar');
        }

        const blob = await res.blob();
        const disposition = res.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="(.+)"/);
        const filename = match ? match[1] : 'conciliacion.xlsx';

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
      } finally {
        loadingEl.classList.remove('visible');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
